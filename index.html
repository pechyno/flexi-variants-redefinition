<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Přeskládání variant ABRA Flexi — přihlášení</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --abra-red:#EA5354;
  --abra-red-hover:#D94344;
  --abra-dark:#343B4E;
  --abra-text:#343B4E;
  --abra-text-light:#6A7087;
  --abra-bg-alt:#F5F6F9;
  --abra-border:#E5E7EB;
  --abra-gradient:linear-gradient(135deg,#EA5354 0%,#FAA73A 100%);
  --shadow-card:0 2px 12px rgba(52,59,78,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:linear-gradient(180deg,#F5F6F9 0%,#FFFFFF 100%);
  color:var(--abra-text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
header{
  background:var(--abra-dark);
  padding:18px 0;
  box-shadow:0 2px 12px rgba(0,0,0,0.15);
}
header .inner{max-width:1160px;margin:0 auto;padding:0 32px;display:flex;align-items:center;gap:18px;}
header .section-name{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.75);font-weight:700;border-left:1px solid rgba(255,255,255,.25);padding-left:18px;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.card{
  background:#FFFFFF;
  border:1px solid var(--abra-border);
  border-radius:14px;
  box-shadow:var(--shadow-card);
  padding:44px 48px 40px;
  width:100%;
  max-width:440px;
  position:relative;
  overflow:hidden;
}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#EA5354,#FAA73A);}
.eyebrow{font-size:12px;font-weight:700;color:var(--abra-red);text-transform:uppercase;letter-spacing:.15em;margin-bottom:14px;display:inline-flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';width:28px;height:2px;background:var(--abra-red);display:inline-block;}
h1{font-size:24px;font-weight:900;letter-spacing:-.02em;line-height:1.25;margin-bottom:8px;}
.lead{font-size:14px;font-weight:500;color:var(--abra-text-light);margin-bottom:28px;}
label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--abra-text-light);margin-bottom:8px;}
input[type=password]{
  width:100%;
  font-family:inherit;
  font-size:15px;
  padding:12px 14px;
  border:1px solid var(--abra-border);
  border-radius:8px;
  outline:none;
  transition:border-color .2s;
}
input[type=password]:focus{border-color:var(--abra-red);}
button{
  width:100%;
  margin-top:18px;
  background:var(--abra-gradient);
  color:#FFFFFF;
  border:none;
  border-radius:8px;
  padding:13px 24px;
  font-family:inherit;
  font-weight:700;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.04em;
  cursor:pointer;
  transition:opacity .2s, transform .2s;
}
button:hover{opacity:.92;transform:translateY(-1px);}
.error{
  display:none;
  background:rgba(234,83,84,.08);
  border:1px solid rgba(234,83,84,.3);
  border-radius:8px;
  color:var(--abra-red);
  font-size:13px;
  font-weight:600;
  padding:10px 14px;
  margin-bottom:18px;
}
.error.show{display:block;}
footer{padding:18px;text-align:center;font-size:12px;color:#9499AB;font-weight:500;}
</style>
</head>
<body>
<header>
  <div class="inner">

      </g>
      <path fill="url(#lgf)" fill-rule="evenodd" d="M93.33,44.28l24.02,41.85h-24.84l-11.45-20.36,12.28-21.49Z"/>
    </svg>
    <span class="section-name">Interní podklad — Customer Success</span>
  </div>
</header>

<main>
  <div class="card">
    <div class="eyebrow">Chráněný obsah</div>
    <h1>Přeskládání variant ABRA Flexi — FY27</h1>
    <p class="lead">Pro zobrazení prezentace zadejte přístupové heslo.</p>
    <div class="error" id="err">Nesprávné heslo. Zkuste to znovu.</div>
    <form method="POST" action="/api/auth">
      <label for="password">Heslo</label>
      <input type="password" id="password" name="password" autocomplete="current-password" autofocus required>
      <button type="submit">Otevřít prezentaci</button>
    </form>
  </div>
</main>

<footer>ABRA Flexi · interní materiál — neposkytujte třetím stranám</footer>

<script>
if (new URLSearchParams(window.location.search).get('error') === '1') {
  document.getElementById('err').classList.add('show');
}
</script>
</body>
</html>
